# ADF Quality Gates — unified config
# Edit scope and thresholds to match your project.
# Generated by /quality-gates setup
#
# Precedence (highest → lowest):
#   shell env var > .env file > this config > built-in defaults
#
# Secrets (SONAR_TOKEN etc.) belong in .env or CI env — never in this file.

# ── Scope ─────────────────────────────────────────────────────────────────────
scope:
  include:
    - src/
    - app/
    - lib/
  exclude:
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/__pycache__/**"
    - "**/*.test.*"
    - "**/*_test.*"
    - "**/migrations/**"

# ── Gate toggles ──────────────────────────────────────────────────────────────
# Set enabled: false to permanently disable a gate for this project.
# Note: gate toggles are NOT overridable via env (they are project policy).
gates:
  secrets:
    enabled: true
  deps:
    enabled: true
  sast:
    enabled: true
  coverage:
    enabled: true
  file-size:
    enabled: true
  sonar:
    enabled: false   # opt-in: requires SONAR_HOST_URL + SONAR_TOKEN
  dast:
    enabled: false   # opt-in: requires endpoints.txt and a target URL

# ── Thresholds ────────────────────────────────────────────────────────────────
thresholds:
  coverage: 70          # Minimum coverage % (exit 1 if below)
                        # Override: QUALITY_GATES_COVERAGE_THRESHOLD
  file_max_loc: 200     # Warn if file exceeds this line count

# ── Trivy (dependency scanning) ───────────────────────────────────────────────
trivy:
  severity: "CRITICAL,HIGH"   # scalar — read_config_value expects comma-separated string
  ignore_unfixed: true
  ignore_file: ""       # Path to .trivyignore (e.g. .trivyignore). Leave empty to skip.

# ── Semgrep (SAST) ────────────────────────────────────────────────────────────
semgrep:
  severity: ERROR       # Block on ERROR; WARNING is informational
  scan_mode: auto   # "rulesets" (default) | "auto" (--config auto, fallback to rulesets on fail)
  rulesets:             # Primary when scan_mode=rulesets; fallback when scan_mode=auto fails
    - p/owasp-top-ten
    - p/secrets
  changed_files_only: true   # Uses --baseline-commit when BASE_SHA is available
  extra_args: ""             # Appended verbatim to semgrep CLI (safe split, no eval)

# ── Gitleaks (secret detection) ───────────────────────────────────────────────
# Scan mode is controlled by QUALITY_GATES_SCOPE env var (injected by git hooks):
#   pre-commit  → scan staged files only (gitleaks protect --staged)
#   (unset)     → diff-aware if BASE_SHA set, else full history
gitleaks:
  config_path: ""    # Override config search order. Leave empty for auto-detect.
  log_opts: ""       # Extra git log options passed to gitleaks detect (e.g. --all)

# ── SonarQube ─────────────────────────────────────────────────────────────────
# Credentials via env only — NEVER hardcode token here.
#   SONAR_HOST_URL    → overrides sonar.host_url
#   SONAR_TOKEN       → always from env (doctor warns if set here)
#   SONAR_PROJECT_KEY → overrides sonar.project_key
sonar:
  host_url: ""         # e.g. https://sonarqube.example.com
  project_key: ""      # e.g. my-project
  token: ""            # LEAVE EMPTY — use SONAR_TOKEN env var
  # Scan properties (sources, exclusions, etc.) go in sonar-project.properties

# ── DAST targets ──────────────────────────────────────────────────────────────
# Targets are declared in endpoints_file — one URL per line.
# Env override: QUALITY_GATES_DAST_LOCAL=1 → run outside CI
dast:
  endpoints_file: .quality-gates/endpoints.txt   # One URL per line
  allow_local: false   # Set true to run DAST outside CI (or QUALITY_GATES_DAST_LOCAL=1)
  block_severity: high  # Block gate on: critical | high (default) | medium
  tags:
    - owasp
    - sqli
    - xss
    - ssrf
    - rce
    - lfi
    - auth-bypass
    - exposure
    - misconfig
    - cve

# ── Extra ignore patterns ─────────────────────────────────────────────────────
# Appended to scope.exclude and applied to all tools.
ignore:
  paths: []              # e.g. ["**/generated/**", "**/vendor/**"]
  secrets_allowlist: []  # gitleaks allowlist rule IDs to suppress

# ── Report storage ─────────────────────────────────────────────────────────────
reports:
  keep_runs: 10    # Number of raw output dirs to retain (oldest pruned after each run)
